<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Juliana Rosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #ffffff; --text: #1a1a1a; --text2: #555555; --text3: #767676; --border: #e5e5e5; --surface: #f7f7f7; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: var(--text); }
    .nav-links { display: flex; gap: 2rem; font-size: 11px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
    .nav-links a { text-decoration: none; color: inherit; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }

    .page-wrap { max-width: 1000px; margin: 0 auto; padding: 4rem 3rem; }

    /* INTRO */
    .about-intro { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; padding-bottom: 3rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .intro-tag { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; color: var(--text3); margin-bottom: 1rem; }
    .intro-h1 { font-size: 32px; font-weight: 300; line-height: 1.2; letter-spacing: -0.5px; margin-bottom: 1.5rem; }
    .intro-h1 strong { font-weight: 500; }
    .intro-bio { font-size: 14px; line-height: 1.85; color: var(--text2); margin-bottom: 1rem; }
    .intro-cta { display: inline-block; margin-top: 0.5rem; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 22px; border-radius: 24px; background: var(--text); color: var(--bg); text-decoration: none; transition: opacity 0.2s; border: none; cursor: pointer; }
    .intro-cta:hover { opacity: 0.8; }
    .about-image { width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 4/5; }
    .about-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .about-image-placeholder { width: 100%; aspect-ratio: 4/5; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--text3); }

    /* SECTION ROW */
    .section-row { display: grid; grid-template-columns: 200px 1fr; gap: 3rem; padding: 2.5rem 0; border-bottom: 1px solid var(--border); }
    .section-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: var(--text3); padding-top: 4px; }
    .section-body { }

    /* SKILLS */
    .skills-list { display: flex; flex-direction: column; gap: 1.25rem; }
    .skill-row { display: flex; gap: 1.5rem; align-items: baseline; }
    .skill-cat { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; color: var(--text3); width: 100px; flex-shrink: 0; }
    .skill-items { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* EXPERIENCE */
    .exp-list { display: flex; flex-direction: column; gap: 1.75rem; }
    .exp-item { display: grid; grid-template-columns: 130px 1fr; gap: 1.5rem; }
    .exp-period { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; color: var(--text3); padding-top: 2px; }
    .exp-role { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .exp-company { font-size: 12px; color: var(--text3); margin-bottom: 0.5rem; }
    .exp-desc { font-size: 13px; color: var(--text2); line-height: 1.7; }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text3); letter-spacing: 0.5px; }
    .footer-langs { display: flex; gap: 1rem; }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .page-wrap { padding: 2.5rem 1.5rem; }
      .about-intro { grid-template-columns: 1fr; gap: 2rem; }
      .about-image { order: -1; aspect-ratio: 4/3; }
      .section-row { grid-template-columns: 1fr; gap: 0.75rem; }
      .exp-item { grid-template-columns: 1fr; gap: 0.25rem; }
      footer { padding: 1.25rem 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page-wrap">
    <div class="about-intro" id="about-intro"></div>

    <div class="section-row" id="skills-row">
      <div class="section-tag">Expertise</div>
      <div class="skills-list" id="skills-list"></div>
    </div>

    <div class="section-row" id="exp-row">
      <div class="section-tag">Experience</div>
      <div class="exp-list" id="exp-list"></div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="data.js"></script>
  <script>
    const nav = portfolioData.navigation;
    const about = portfolioData.about;
    const footer = portfolioData.footer;

    document.getElementById('nav').innerHTML = `
      <a href="index.html" class="nav-logo">${nav.logo}</a>
      <div class="nav-links">${nav.links.map(l => `<a href="${l.url}">${l.text}</a>`).join('')}</div>`;

    const imgHtml = about.image
      ? `<div class="about-image"><img src="${about.image}" alt="Juliana Rosa" /></div>`
      : `<div class="about-image-placeholder">👋</div>`;

    document.getElementById('about-intro').innerHTML = `
      <div>
        <div class="intro-tag">${about.tag}</div>
        <h1 class="intro-h1">${about.headline}<br><strong>${about.headlineStrong}</strong></h1>
        <p class="intro-bio">${about.bio1}</p>
        <p class="intro-bio">${about.bio2}</p>
        <a href="${about.ctaUrl}" class="intro-cta">${about.ctaText}</a>
      </div>
      ${imgHtml}`;

    document.getElementById('skills-list').innerHTML = about.skills.map(sk => `
      <div class="skill-row">
        <div class="skill-cat">${sk.category}</div>
        <div class="skill-items">${sk.items}</div>
      </div>`).join('');

    document.getElementById('exp-list').innerHTML = about.experience.map(ex => `
      <div class="exp-item">
        <div class="exp-period">${ex.period}</div>
        <div>
          <div class="exp-role">${ex.role}</div>
          <div class="exp-company">${ex.company}</div>
          <div class="exp-desc">${ex.description}</div>
        </div>
      </div>`).join('');

    document.getElementById('footer').innerHTML = `<span>${footer.copyright}</span><div class="footer-langs">${footer.languages.map(l => `<span>${l}</span>`).join('')}</div>`;
  </script>
</body>
</html>
