<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Juliana Rosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #ffffff; --text: #1a1a1a; --text2: #555555; --text3: #767676; --border: #e5e5e5; --surface: #f7f7f7; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: var(--text); }
    .nav-links { display: flex; gap: 2rem; font-size: 11px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
    .nav-links a { text-decoration: none; color: inherit; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }

    .page-wrap { max-width: 1000px; margin: 0 auto; padding: 4rem 3rem; }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }

    .contact-tag { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; color: var(--text3); margin-bottom: 1rem; }
    .contact-h1 { font-size: 32px; font-weight: 300; line-height: 1.2; letter-spacing: -0.5px; margin-bottom: 1.5rem; }
    .contact-h1 strong { font-weight: 500; }
    .contact-sub { font-size: 13px; line-height: 1.85; color: var(--text2); margin-bottom: 2.5rem; }

    .contact-links { display: flex; flex-direction: column; gap: 1rem; }
    .contact-link { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text2); text-decoration: none; transition: color 0.2s; }
    .contact-link:hover { color: var(--text); }
    .contact-link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }

    .availability { display: inline-flex; align-items: center; gap: 6px; margin-top: 2rem; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; color: var(--text3); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; }
    .availability::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: inline-block; }

    /* FORM */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .form-group label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; color: var(--text3); }
    .form-group input,
    .form-group textarea {
      font-family: 'Montserrat', sans-serif; font-size: 13px; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; transition: border-color 0.2s; width: 100%; resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: var(--text); background: var(--bg); }
    .form-group textarea { min-height: 120px; }

    .btn { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 22px; border-radius: 24px; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; border: none; }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover { opacity: 0.8; }

    .form-success { display: none; font-size: 12px; color: #166534; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 14px; margin-top: 1rem; }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text3); letter-spacing: 0.5px; margin-top: 4rem; }
    .footer-langs { display: flex; gap: 1rem; }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .page-wrap { padding: 2.5rem 1.5rem; }
      .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      footer { padding: 1.25rem 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page-wrap">
    <div class="contact-grid">
      <div id="contact-info"></div>
      <div id="contact-form-wrap"></div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="data.js"></script>
  <script>
    const nav = portfolioData.navigation;
    const contact = portfolioData.contact;
    const footer = portfolioData.footer;

    document.getElementById('nav').innerHTML = `
      <a href="index.html" class="nav-logo">${nav.logo}</a>
      <div class="nav-links">${nav.links.map(l => `<a href="${l.url}">${l.text}</a>`).join('')}</div>`;

    document.getElementById('contact-info').innerHTML = `
      <div class="contact-tag">${contact.tag}</div>
      <h1 class="contact-h1">${contact.headline}<br><strong>${contact.headlineStrong}</strong></h1>
      <p class="contact-sub">${contact.subtitle}</p>
      <div class="contact-links">
        ${contact.email ? `<a href="mailto:${contact.email}" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          ${contact.email}</a>` : ''}
        ${contact.linkedin ? `<a href="${contact.linkedin}" target="_blank" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn</a>` : ''}
      </div>
      ${contact.availability ? `<div class="availability">${contact.availability}</div>` : ''}`;

    document.getElementById('contact-form-wrap').innerHTML = `
      <form id="contact-form">
        <div class="form-group"><label for="cf-name">Name</label><input type="text" id="cf-name" name="name" placeholder="Your name" required /></div>
        <div class="form-group"><label for="cf-email">Email</label><input type="email" id="cf-email" name="email" placeholder="your@email.com" required /></div>
        <div class="form-group"><label for="cf-subject">Subject</label><input type="text" id="cf-subject" name="subject" placeholder="Role / project / hello" /></div>
        <div class="form-group"><label for="cf-message">Message</label><textarea id="cf-message" name="message" placeholder="Tell me about the role or project..." required></textarea></div>
        <button type="submit" class="btn btn-primary">Send message</button>
        <div class="form-success" id="form-success">Message sent! I'll get back to you soon.</div>
      </form>`;

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fid = contact.formspreeId;
      if (!fid) {
        alert('Contact form not configured yet. Please email directly: ' + contact.email);
        return;
      }
      const data = { name: document.getElementById('cf-name').value, email: document.getElementById('cf-email').value, subject: document.getElementById('cf-subject').value, message: document.getElementById('cf-message').value };
      try {
        const res = await fetch(`https://formspree.io/f/${fid}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(data) });
        if (res.ok) { document.getElementById('contact-form').reset(); document.getElementById('form-success').style.display = 'block'; }
      } catch(err) { alert('Something went wrong. Please email me directly.'); }
    });

    document.getElementById('footer').innerHTML = `<span>${footer.copyright}</span><div class="footer-langs">${footer.languages.map(l => `<span>${l}</span>`).join('')}</div>`;
  </script>
</body>
</html>
