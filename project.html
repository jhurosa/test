<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Study — Juliana Rosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg: #f8f7f4;
      --c-white: #ffffff;
      --c-ink: #1a1a1a;
      --c-body: #555555;
      --c-muted: #767676;
      --c-border: #e5e3de;
      --c-accent: #1A5780;
      --c-accent-light: #e8f0f6;
      --font: 'Montserrat', sans-serif;
      --radius: 12px;
      --max: 780px;
    }

    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-ink);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(248,247,244,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--c-border);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--c-ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-logo span { color: var(--c-accent); }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--c-body);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--c-accent); }

    /* BLUR CONTENT */
    #page-content {
      transition: filter 0.3s;
    }

    #page-content.blurred {
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
    }

    /* HERO */
    .project-hero {
      padding-top: 64px;
      background: var(--c-white);
      border-bottom: 1px solid var(--c-border);
    }

    .project-hero-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 64px 40px 48px;
    }

    .project-category {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 16px;
    }

    .project-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--c-ink);
      margin-bottom: 20px;
      line-height: 1.1;
    }

    .project-tagline {
      font-size: 1.1rem;
      color: var(--c-body);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 600px;
    }

    .project-meta {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      padding-top: 32px;
      border-top: 1px solid var(--c-border);
    }

    .meta-item {}
    .meta-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-bottom: 4px;
    }
    .meta-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--c-ink);
    }

    .project-hero-image {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }

    /* SECTIONS */
    .project-section {
      max-width: var(--max);
      margin: 0 auto;
      padding: 64px 40px;
      border-bottom: 1px solid var(--c-border);
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 12px;
    }

    .section-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--c-ink);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .section-text {
      font-size: 0.97rem;
      color: var(--c-body);
      line-height: 1.85;
    }

    .section-text p { margin-bottom: 16px; }
    .section-text p:last-child { margin-bottom: 0; }

    .section-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .section-split.reverse { direction: rtl; }
    .section-split.reverse > * { direction: ltr; }

    .section-image {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
      display: block;
    }

    /* METRICS */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }

    .metric-card {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--c-accent);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric-label {
      font-size: 0.8rem;
      color: var(--c-body);
      line-height: 1.4;
    }

    /* GALLERY */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .gallery-thumb {
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--c-border);
      cursor: pointer;
      position: relative;
      background: var(--c-accent-light);
      transition: transform 0.2s;
    }

    .gallery-thumb:hover { transform: scale(1.02); }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .gallery-thumb:hover img { opacity: 0.9; }

    .gallery-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: #fff;
      font-size: 0.75rem;
      padding: 20px 10px 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-thumb:hover .gallery-caption { opacity: 1; }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      display: block;
    }

    .lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.25); }

    .lightbox-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 48px; height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-arrow:hover { background: rgba(255,255,255,0.3); }
    .lightbox-arrow.prev { left: 20px; }
    .lightbox-arrow.next { right: 20px; }

    .lightbox-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-family: var(--font);
      font-size: 0.85rem;
    }

    .lightbox-caption {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.85);
      font-family: var(--font);
      font-size: 0.88rem;
      text-align: center;
      max-width: 600px;
    }

    /* PROTOTYPE */
    .prototype-embed {
      width: 100%;
      height: 600px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      margin-top: 24px;
    }

    /* RELATED */
    .related-section {
      background: var(--c-white);
      padding: 64px 40px;
    }

    .related-inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }

    .related-card {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s;
    }

    .related-card:hover {
      border-color: var(--c-accent);
      transform: translateY(-2px);
    }

    .related-card-category {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-accent);
      margin-bottom: 6px;
    }

    .related-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--c-ink);
    }

    /* NDA MODAL */
    .nda-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    .nda-overlay.active { display: flex; }

    .nda-modal {
      background: var(--c-white);
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }

    .nda-icon { font-size: 2rem; margin-bottom: 16px; }
    .nda-title { font-size: 1.2rem; font-weight: 700; color: var(--c-ink); margin-bottom: 8px; }
    .nda-desc { font-size: 0.88rem; color: var(--c-body); line-height: 1.6; margin-bottom: 24px; }

    .nda-tabs {
      display: flex;
      border: 1.5px solid var(--c-border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .nda-tab {
      flex: 1;
      padding: 10px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--c-muted);
      transition: all 0.2s;
    }

    .nda-tab.active { background: var(--c-accent); color: #fff; }

    .nda-panel { display: none; }
    .nda-panel.active { display: block; }

    .nda-input {
      width: 100%;
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 12px 16px;
      border: 1.5px solid var(--c-border);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .nda-input:focus { outline: none; border-color: var(--c-accent); }
    .nda-error { font-size: 0.82rem; color: #c62828; margin-bottom: 10px; display: none; }

    .nda-actions { display: flex; gap: 12px; margin-top: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--c-accent); color: #fff; }
    .btn-primary:hover { background: #154668; }

    .btn-outline {
      background: transparent;
      color: var(--c-body);
      border: 1.5px solid var(--c-border);
    }
    .btn-outline:hover { border-color: var(--c-ink); color: var(--c-ink); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid var(--c-border);
      font-size: 0.82rem;
      color: var(--c-muted);
      font-family: var(--font);
    }

    /* NOT FOUND */
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 40px;
    }

    .not-found h2 { font-size: 1.5rem; margin: 16px 0 8px; color: var(--c-ink); }
    .not-found p { color: var(--c-body); margin-bottom: 24px; }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .project-hero-inner { padding: 48px 20px 32px; }
      .project-section { padding: 48px 20px; }
      .section-split { grid-template-columns: 1fr; }
      .section-split.reverse { direction: ltr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Juli<span>.</span></a>
    <a href="index.html#work" class="nav-back">
      ← Back to work
    </a>
  </nav>

  <!-- NDA MODAL -->
  <div class="nda-overlay" id="nda-overlay">
    <div class="nda-modal">
      <div class="nda-icon">🔒</div>
      <div class="nda-title">Protected case study</div>
      <p class="nda-desc">This project is under NDA. Enter the password to view or request access.</p>
      <div class="nda-tabs">
        <button class="nda-tab active" onclick="switchTab('password')">I have the password</button>
        <button class="nda-tab" onclick="switchTab('request')">Request access</button>
      </div>
      <div class="nda-panel active" id="panel-password">
        <input type="password" class="nda-input" id="nda-pw-input" placeholder="Enter password" />
        <div class="nda-error" id="nda-error">Incorrect password. Try again.</div>
        <div class="nda-actions">
          <button class="btn btn-outline" onclick="goBack()">← Go back</button>
          <button class="btn btn-primary" onclick="submitPassword()">Unlock</button>
        </div>
      </div>
      <div class="nda-panel" id="panel-request">
        <input type="text" class="nda-input" id="req-name" placeholder="Your name" />
        <input type="email" class="nda-input" id="req-email" placeholder="Your email" />
        <input type="text" class="nda-input" id="req-company" placeholder="Company / context (optional)" />
        <div class="nda-actions">
          <button class="btn btn-outline" onclick="goBack()">← Go back</button>
          <button class="btn btn-primary" onclick="submitRequest()">Send request</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div id="page-content">
    <div id="project-container"></div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <button class="lightbox-arrow prev" onclick="prevImage()">&#8592;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <button class="lightbox-arrow next" onclick="nextImage()">&#8594;</button>
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <footer>
      <p>© 2026 Juliana Rosa</p>
    </footer>
  </div>

  <script src="projectData.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');
    const project = projectsData.projects.find(p => p.id === projectId);
    const site = projectsData.site;
    const container = document.getElementById('project-container');

    if (!project) {
      container.innerHTML = `
        <div class="not-found" style="padding-top:64px">
          <div style="font-size:3rem">🔍</div>
          <h2>Project not found</h2>
          <p>This case study doesn't exist or may have moved.</p>
          <a href="index.html" class="btn btn-primary">Back to portfolio</a>
        </div>`;
    } else {
      document.title = `${project.title} — Juliana Rosa`;

      // NDA check
      if (project.nda && !sessionStorage.getItem('nda_access')) {
        document.getElementById('page-content').classList.add('blurred');
        document.getElementById('nda-overlay').classList.add('active');
      }

      renderProject(project);
    }

    function renderProject(p) {
      const sec = p.sections || {};
      let html = '';

      // HERO
      html += `
        <div class="project-hero">
          <div class="project-hero-inner">
            <div class="project-category">${p.category || 'UX Design'}</div>
            <h1 class="project-title">${p.title}</h1>
            ${sec.overview?.tagline ? `<p class="project-tagline">${sec.overview.tagline}</p>` : ''}
            <div class="project-meta">
              ${p.role ? `<div class="meta-item"><div class="meta-label">Role</div><div class="meta-value">${p.role}</div></div>` : ''}
              ${p.duration ? `<div class="meta-item"><div class="meta-label">Duration</div><div class="meta-value">${p.duration}</div></div>` : ''}
              ${p.year ? `<div class="meta-item"><div class="meta-label">Year</div><div class="meta-value">${p.year}</div></div>` : ''}
              ${p.tools ? `<div class="meta-item"><div class="meta-label">Tools</div><div class="meta-value">${p.tools}</div></div>` : ''}
            </div>
          </div>
          ${p.cardImage ? `<img class="project-hero-image" src="${p.cardImage}" alt="${p.title}" />` : ''}
        </div>`;

      // OVERVIEW
      if (sec.overview?.enabled !== false && sec.overview?.text) {
        const hasImage = sec.overview.image;
        html += `<div class="project-section">`;
        if (hasImage) {
          html += `<div class="section-split">
            <div>
              <div class="section-label">Overview</div>
              <div class="section-text">${formatText(sec.overview.text)}</div>
            </div>
            <img src="${sec.overview.image}" alt="Overview" class="section-image" />
          </div>`;
        } else {
          html += `<div class="section-label">Overview</div>
            <div class="section-text">${formatText(sec.overview.text)}</div>`;
        }
        html += `</div>`;
      }

      // CHALLENGE
      if (sec.challenge?.enabled !== false && sec.challenge?.text) {
        const hasImage = sec.challenge.image;
        html += `<div class="project-section" style="background:var(--c-white)">`;
        if (hasImage) {
          html += `<div class="section-split reverse">
            <div>
              <div class="section-label">Challenge</div>
              ${sec.challenge.title ? `<h2 class="section-heading">${sec.challenge.title}</h2>` : ''}
              <div class="section-text">${formatText(sec.challenge.text)}</div>
            </div>
            <img src="${sec.challenge.image}" alt="Challenge" class="section-image" />
          </div>`;
        } else {
          html += `<div class="section-label">Challenge</div>
            ${sec.challenge.title ? `<h2 class="section-heading">${sec.challenge.title}</h2>` : ''}
            <div class="section-text">${formatText(sec.challenge.text)}</div>`;
        }
        html += `</div>`;
      }

      // SOLUTION
      if (sec.solution?.enabled !== false && sec.solution?.text) {
        const hasImage = sec.solution.image;
        html += `<div class="project-section">`;
        if (hasImage) {
          html += `<div class="section-split">
            <div>
              <div class="section-label">Solution</div>
              ${sec.solution.title ? `<h2 class="section-heading">${sec.solution.title}</h2>` : ''}
              <div class="section-text">${formatText(sec.solution.text)}</div>
            </div>
            <img src="${sec.solution.image}" alt="Solution" class="section-image" />
          </div>`;
        } else {
          html += `<div class="section-label">Solution</div>
            ${sec.solution.title ? `<h2 class="section-heading">${sec.solution.title}</h2>` : ''}
            <div class="section-text">${formatText(sec.solution.text)}</div>`;
        }
        html += `</div>`;
      }

      // GALLERY
      if (sec.gallery?.enabled && sec.gallery?.images?.length > 0) {
        html += `<div class="project-section" style="background:var(--c-white)">
          <div class="section-label">Gallery</div>
          <h2 class="section-heading">Screens & Deliverables</h2>
          <div class="gallery-grid" id="gallery-grid">`;
        sec.gallery.images.forEach((img, i) => {
          html += `
            <div class="gallery-thumb" onclick="openLightbox(${i})">
              <img src="${img.url}" alt="${img.caption || 'Screen ' + (i+1)}" loading="lazy" />
              ${img.caption ? `<div class="gallery-caption">${img.caption}</div>` : ''}
            </div>`;
        });
        html += `</div></div>`;
      }

      // RESULTS
      if (sec.results?.enabled !== false && sec.results?.text) {
        html += `<div class="project-section">
          <div class="section-label">Results</div>
          <div class="section-text">${formatText(sec.results.text)}</div>`;
        if (sec.results.metrics?.length > 0) {
          html += `<div class="metrics-grid">`;
          sec.results.metrics.forEach(m => {
            html += `<div class="metric-card">
              <div class="metric-value">${m.value}</div>
              <div class="metric-label">${m.label}</div>
            </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      }

      // PROTOTYPE
      if (sec.prototype?.enabled && sec.prototype?.url) {
        html += `<div class="project-section" style="background:var(--c-white)">
          <div class="section-label">Prototype</div>
          <h2 class="section-heading">Interactive Prototype</h2>
          <iframe class="prototype-embed" src="${sec.prototype.url}" allowfullscreen></iframe>
        </div>`;
      }

      // RELATED
      const others = projectsData.projects.filter(p2 => p2.id !== p.id && p2.published !== false).slice(0, 3);
      if (others.length > 0) {
        html += `<div class="related-section">
          <div class="related-inner">
            <div class="section-label">More work</div>
            <h2 style="font-size:1.4rem;font-weight:700;letter-spacing:-0.02em;color:var(--c-ink);margin-bottom:0">Other case studies</h2>
            <div class="related-grid">`;
        others.forEach(r => {
          html += `<a href="project.html?id=${r.id}" class="related-card">
            <div class="related-card-category">${r.category || 'UX Design'}</div>
            <div class="related-card-title">${r.title}</div>
          </a>`;
        });
        html += `</div></div></div>`;
      }

      container.innerHTML = html;
    }

    function formatText(text) {
      if (!text) return '';
      return text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    }

    // LIGHTBOX
    let currentIndex = 0;
    let galleryImages = [];

    function getGalleryImages() {
      if (!project) return [];
      return project.sections?.gallery?.images || [];
    }

    function openLightbox(index) {
      galleryImages = getGalleryImages();
      currentIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const img = galleryImages[currentIndex];
      document.getElementById('lightbox-img').src = img.url;
      document.getElementById('lightbox-img').alt = img.caption || '';
      document.getElementById('lightbox-caption').textContent = img.caption || '';
      document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${galleryImages.length}`;
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
      updateLightbox();
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % galleryImages.length;
      updateLightbox();
    }

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    // NDA
    function switchTab(tab) {
      document.querySelectorAll('.nda-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'password' && i === 0) || (tab === 'request' && i === 1));
      });
      document.getElementById('panel-password').classList.toggle('active', tab === 'password');
      document.getElementById('panel-request').classList.toggle('active', tab === 'request');
    }

    function goBack() { window.location.href = 'index.html'; }

    async function hashStr(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function submitPassword() {
      const input = document.getElementById('nda-pw-input').value;
      const hash = await hashStr(input);
      if (hash === site.gdprPasswordHash) {
        sessionStorage.setItem('nda_access', '1');
        document.getElementById('nda-overlay').classList.remove('active');
        document.getElementById('page-content').classList.remove('blurred');
      } else {
        document.getElementById('nda-error').style.display = 'block';
      }
    }

    document.getElementById('nda-pw-input')?.addEventListener('keypress', e => {
      if (e.key === 'Enter') submitPassword();
    });

    function submitRequest() {
      const name = document.getElementById('req-name').value;
      const email = document.getElementById('req-email').value;
      if (!name || !email) return alert('Please fill in name and email.');
      const reqs = JSON.parse(localStorage.getItem('nda_requests') || '[]');
      reqs.push({ name, email, company: document.getElementById('req-company').value, project: projectId, date: new Date().toISOString() });
      localStorage.setItem('nda_requests', JSON.stringify(reqs));
      alert('Request sent! You\'ll hear back soon.');
      goBack();
    }
  </script>
</body>
</html>
