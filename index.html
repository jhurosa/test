<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juliana Rosa — UX Designer</title>
  <meta name="description" content="UX Designer with 7+ years of experience. Strategic design and measurable impact." />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --text: #1a1a1a; --text2: #555555; --text3: #767676;
      --border: #e5e5e5; --surface: #f7f7f7;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: var(--text); }
    .nav-links { display: flex; gap: 2rem; font-size: 11px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
    .nav-links a { text-decoration: none; color: inherit; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }

    .hero { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 3rem; padding: 4rem 3rem 3rem; max-width: 1200px; margin: 0 auto; }
    .hero-tag { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; color: var(--text3); margin-bottom: 1rem; }
    .hero h1 { font-size: 38px; font-weight: 300; line-height: 1.15; margin-bottom: 1.25rem; letter-spacing: -0.5px; }
    .hero h1 strong { font-weight: 500; }
    .hero-sub { font-size: 14px; line-height: 1.85; font-weight: 400; color: var(--text2); max-width: 360px; margin-bottom: 1.5rem; }
    .hero-cta { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
    .btn { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 22px; border-radius: 24px; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; border: none; }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-secondary { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .hero-stats { display: flex; gap: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .stat-num { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
    .stat-label { font-size: 12px; font-weight: 400; color: var(--text3); margin-top: 3px; letter-spacing: 0.5px; }
    .hero-image { width: 100%; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    .hero-image img { width: 100%; height: 100%; object-fit: cover; }

    .projects { max-width: 1200px; margin: 0 auto; padding: 2rem 3rem 4rem; }
    .divider { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: var(--text2); white-space: nowrap; }

    .nda-banner { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; margin-bottom: 1.5rem; font-size: 12px; font-weight: 400; color: var(--text2); line-height: 1.6; }
    .nda-banner svg { flex-shrink: 0; opacity: 0.5; }
    .nda-banner a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }

    .project-grid { display: grid; gap: 1rem; margin-bottom: 3rem; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }

    .card { border-radius: 12px; border: 1px solid var(--border); background: var(--bg); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.2s; text-decoration: none; color: inherit; display: block; }
    .card:hover { border-color: #aaaaaa; transform: translateY(-2px); }
    .card.locked { opacity: 0.72; }
    .card.locked:hover { opacity: 1; }
    .card-thumb { height: 140px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card.locked .card-thumb { filter: blur(3px); }
    .card-thumb-placeholder { padding: 16px; width: 100%; display: flex; flex-direction: column; gap: 7px; }
    .placeholder-bar { height: 8px; border-radius: 4px; background: var(--border); }
    .placeholder-row { display: flex; gap: 8px; align-items: center; }
    .placeholder-sq { border-radius: 4px; background: var(--border); width: 40px; height: 40px; flex-shrink: 0; }
    .card-body { padding: 0.75rem 1rem 0.9rem; }
    .card-date { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; color: var(--text3); margin-bottom: 5px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; }
    .card-desc { font-size: 12px; font-weight: 400; color: var(--text2); line-height: 1.6; }
    .card-metric { display: inline-block; margin-top: 9px; font-size: 11px; font-weight: 500; background: var(--surface); color: var(--text3); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 400; color: var(--text3); letter-spacing: 0.5px; }
    .footer-langs { display: flex; gap: 1rem; }

    @media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .hero { grid-template-columns: 1fr; padding: 2rem 1.5rem; gap: 2rem; }
      .hero-image { order: -1; }
      .hero h1 { font-size: 28px; }
      .projects { padding: 1.5rem 1.5rem 3rem; }
      .grid-4, .grid-3 { grid-template-columns: 1fr; }
      footer { padding: 1.25rem 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <section class="hero" id="hero"></section>
  <section class="projects" id="projects"></section>
  <footer id="footer"></footer>

  <script src="data.js"></script>
  <script>
    function renderNav() {
      const d = portfolioData.navigation;
      document.getElementById('nav').innerHTML = `
        <a href="index.html" class="nav-logo">${d.logo}</a>
        <div class="nav-links">${d.links.map(l => `<a href="${l.url}">${l.text}</a>`).join('')}</div>`;
    }

    function renderHero() {
      const d = portfolioData.hero;
      document.getElementById('hero').innerHTML = `
        <div>
          <div class="hero-tag">${d.tag}</div>
          <h1>${d.headline}<br><strong>${d.headlineStrong}</strong></h1>
          <p class="hero-sub">${d.subtitle}</p>
          <div class="hero-cta">
            <a href="${d.ctaPrimary.url}" class="btn btn-primary">${d.ctaPrimary.text}</a>
            <a href="${d.ctaSecondary.url}" class="btn btn-secondary">${d.ctaSecondary.text}</a>
          </div>
          <div class="hero-stats">${d.stats.map(s => `<div><div class="stat-num">${s.number}</div><div class="stat-label">${s.label}</div></div>`).join('')}</div>
        </div>
        <div class="hero-image"><img src="${d.image}" alt="Juliana Rosa" /></div>`;
    }

    function renderCard(p) {
      const thumb = p.image
        ? `<img src="${p.image}" alt="${p.title}" />`
        : `<div class="card-thumb-placeholder"><div class="placeholder-row"><div class="placeholder-sq"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px;"><div class="placeholder-bar" style="width:80%"></div><div class="placeholder-bar" style="width:55%"></div></div></div></div>`;
      return `<a href="${p.link || '#'}" class="card ${p.locked ? 'locked' : ''}">
        <div class="card-thumb">${thumb}</div>
        <div class="card-body">
          <div class="card-date">${p.date}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.description}</div>
          ${p.metric ? `<div class="card-metric">${p.metric}</div>` : ''}
        </div></a>`;
    }

    function renderProjects() {
      const ind = portfolioData.industrySection;
      const aca = portfolioData.academicSection;
      const indCols = ind.projects.length >= 4 ? 'grid-4' : 'grid-3';
      const acaCols = aca.projects.length >= 4 ? 'grid-4' : 'grid-3';
      let ndaHtml = '';
      if (ind.ndaBanner && ind.ndaBanner.enabled) {
        ndaHtml = `<div class="nda-banner"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>${ind.ndaBanner.text} <a href="${ind.ndaBanner.linkUrl}">&nbsp;${ind.ndaBanner.linkText}</a></div>`;
      }
      document.getElementById('projects').innerHTML = `
        <div class="divider"><div class="divider-line"></div><div class="divider-label">${ind.title}</div><div class="divider-line"></div></div>
        ${ndaHtml}
        <div class="project-grid ${indCols}">${ind.projects.map(renderCard).join('')}</div>
        <div class="divider"><div class="divider-line"></div><div class="divider-label">${aca.title}</div><div class="divider-line"></div></div>
        <div class="project-grid ${acaCols}">${aca.projects.map(renderCard).join('')}</div>`;
    }

    function renderFooter() {
      const d = portfolioData.footer;
      document.getElementById('footer').innerHTML = `<span>${d.copyright}</span><div class="footer-langs">${d.languages.map(l => `<span>${l}</span>`).join('')}</div>`;
    }

    document.addEventListener('DOMContentLoaded', () => { renderNav(); renderHero(); renderProjects(); renderFooter(); });
  </script>
</body>
</html>
